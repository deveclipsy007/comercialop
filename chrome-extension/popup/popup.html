<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=300">
  <title>Operon Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 260px;
      background: #0a0b0f;
      color: #e8e9ed;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      padding: 20px;
      text-align: center;
    }
    .logo {
      width: 48px; height: 48px;
      margin: 0 auto 12px;
      background: rgba(163, 230, 53, 0.12);
      border: 2px solid rgba(163, 230, 53, 0.25);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo .material-symbols-outlined {
      font-size: 24px;
      color: #a3e635;
      font-variation-settings: 'FILL' 1;
    }
    h1 { font-size: 14px; font-weight: 900; margin-bottom: 4px; }
    p { font-size: 11px; color: #8b8d97; margin-bottom: 16px; }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      height: 38px;
      background: #a3e635;
      color: #0a0b0f;
      border: none;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { filter: brightness(1.1); }
    .btn .material-symbols-outlined { font-size: 16px; }
    .hint {
      font-size: 10px;
      color: #5a5c66;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="logo">
    <span class="material-symbols-outlined">radar</span>
  </div>
  <h1>Operon Intelligence</h1>
  <p>Cockpit operacional inteligente</p>
  <button class="btn" id="btnOpenPanel">
    <span class="material-symbols-outlined">side_navigation</span>
    Abrir Painel Lateral
  </button>
  <p class="hint">O cockpit funciona no painel lateral para manter o contexto enquanto navega.</p>

  <script>
    document.getElementById('btnOpenPanel').addEventListener('click', async () => {
      try {
        // Open side panel
        const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
        if (tab?.id) {
          await chrome.sidePanel.open({ tabId: tab.id });
        }
        // Close popup
        window.close();
      } catch (err) {
        console.warn('Fallback: Side panel may already be open', err);
        window.close();
      }
    });
  </script>
</body>
</html>
